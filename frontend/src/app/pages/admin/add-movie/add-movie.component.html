<section class="listing-card fade-up">
    <h1 class="section-title">Add Movie</h1>
    <form (ngSubmit)="onSubmit()" class="stack-form">
        <mat-form-field appearance="outline">
            <mat-label>Movie Name</mat-label>
            <input matInput type="text" name="title" placeholder="Enter movie name" [(ngModel)]="movie.movieName" required autofocus>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Poster Image URL</mat-label>
            <input matInput type="text" name="poster" placeholder="Enter poster image link" [(ngModel)]="movie.poster" required autofocus>
        </mat-form-field>
        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Duration</mat-label>
                <input [(ngModel)]="movie.duration" matInput type="text" name="duration" placeholder="Movie duration in minutes" required autofocus>
            </mat-form-field>
            <mat-form-field appearance="outline">
                <mat-label>Release Date</mat-label>
                <input [(ngModel)]="movie.releaseDate" matInput [matDatepicker]="releasePicker" name="releaseDate" placeholder="Select release date" required>
                <mat-datepicker-toggle matSuffix [for]="releasePicker"></mat-datepicker-toggle>
                <mat-datepicker #releasePicker></mat-datepicker>
            </mat-form-field>
        </div>
    </form>
    <div class="text-center">
        <button mat-flat-button color="primary" class="app-btn" (click)="onSubmit()">Add Movie</button>
    </div>
</section>
