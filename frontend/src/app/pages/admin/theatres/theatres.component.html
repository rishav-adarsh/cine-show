<section class="listing-card fade-up">
    <h1 class="section-title">All Theatres</h1>
    <div class="filters-bar">
        <mat-form-field appearance="outline">
            <mat-label>Search theatre or location</mat-label>
            <input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilters()" placeholder="Eg: INOX, Mumbai..." />
        </mat-form-field>
    </div>

    <div *ngIf="isLoading" class="skeleton-grid">
        <div class="skeleton-card" *ngFor="let n of [1,2,3]"></div>
    </div>

    <div class="listing-item" *ngFor="let theatre of filteredTheatres" [hidden]="isLoading">
        <mat-icon>theaters</mat-icon>
        <div style="flex: 1;">
            <h4>{{ theatre.theatreName }}</h4>
            <p class="section-subtitle">{{ theatre.location }}</p>
        </div>
        <button mat-stroked-button class="app-btn" (click)="setupSeats(theatre)">
            <mat-icon>grid_on</mat-icon>
            Setup Seats
        </button>
    </div>
    <p class="section-subtitle" *ngIf="!isLoading && !filteredTheatres.length">No theatres found for this search.</p>
    <div class="text-center">
        <button mat-flat-button color="primary" class="app-btn" routerLink="/admin/add-theatre">Add New Theatre</button>
    </div>
</section>
