<aside class="side-menu">
    <span class="side-menu-title">Admin Panel</span>
    <mat-action-list role="list">
        <button mat-list-item class="side-link" routerLink="/admin" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}"><mat-icon mat-list-icon>space_dashboard</mat-icon>Dashboard</button>
        <button mat-list-item class="side-link" routerLink="/admin/profile" routerLinkActive="active-link"><mat-icon mat-list-icon>person</mat-icon>Profile</button>
        <button mat-list-item class="side-link" routerLink="/admin/movies" routerLinkActive="active-link"><mat-icon mat-list-icon>local_movies</mat-icon>Movies</button>
        <button mat-list-item class="side-link" routerLink="/admin/add-movie" routerLinkActive="active-link"><mat-icon mat-list-icon>add_circle</mat-icon>Add Movie</button>
        <button mat-list-item class="side-link" routerLink="/admin/theatres" routerLinkActive="active-link"><mat-icon mat-list-icon>theaters</mat-icon>Theatres</button>
        <button mat-list-item class="side-link" routerLink="/admin/add-theatre" routerLinkActive="active-link"><mat-icon mat-list-icon>apartment</mat-icon>Add Theatre</button>
        <button mat-list-item class="side-link" routerLink="/admin/add-show" routerLinkActive="active-link"><mat-icon mat-list-icon>event_available</mat-icon>Add Show</button>
    </mat-action-list>
