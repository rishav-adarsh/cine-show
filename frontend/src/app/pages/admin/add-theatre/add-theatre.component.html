<section class="listing-card fade-up">
    <h1 class="section-title">Add Theatre</h1>
    <form (ngSubmit)="onSubmit()" class="stack-form">
        <mat-form-field appearance="outline">
            <mat-label>Theatre Name</mat-label>
            <input matInput type="text" name="name" placeholder="Enter theatre name" [(ngModel)]="theatre.theatreName" required autofocus>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Location</mat-label>
            <input matInput type="text" name="location" placeholder="Enter location" [(ngModel)]="theatre.location" required autofocus>
        </mat-form-field>
    </form>
    <div class="text-center">
        <button mat-flat-button color="primary" class="app-btn" (click)="onSubmit()">Add Theatre</button>
    </div>
</section>
