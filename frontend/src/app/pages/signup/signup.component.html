<section class="auth-shell glass-card fade-up">
    <img class="auth-logo" src="https://img.icons8.com/fluency/96/ticket.png" alt="Ticket logo" />
    <h1 class="auth-title">Create Your Account</h1>
    <p class="auth-subtitle">Join CineShow for faster seat booking and smoother movie nights.</p>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <mat-form-field class="form-input" appearance="outline">
            <mat-label>Username</mat-label>
            <input formControlName="username" matInput />
            <mat-hint>Username must be unique</mat-hint>
        </mat-form-field>

        <mat-form-field class="form-input" appearance="outline">
            <mat-label>Password</mat-label>
            <input formControlName="password" matInput [type]="hide ? 'password' : 'text'">
            <button mat-icon-button matSuffix type="button" (click)="hide = !hide" [attr.aria-label]="'Hide password'"
                [attr.aria-pressed]="hide">
                <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
        </mat-form-field>

        <div class="form-row">
            <mat-form-field class="form-input" appearance="outline">
                <mat-label>First Name</mat-label>
                <input formControlName="firstName" matInput />
            </mat-form-field>

            <mat-form-field class="form-input" appearance="outline">
                <mat-label>Last Name</mat-label>
                <input formControlName="lastName" matInput />
            </mat-form-field>
        </div>

        <mat-form-field class="form-input" appearance="outline">
            <mat-label>Email</mat-label>
            <input formControlName="email" matInput />
        </mat-form-field>

        <mat-form-field class="form-input" appearance="outline">
            <mat-label>Phone</mat-label>
            <input formControlName="phone" matInput />
        </mat-form-field>

        <div class="auth-actions">
            <button type="submit" mat-flat-button color="primary" class="app-btn">Signup</button>
            <button type="reset" mat-stroked-button class="app-btn">Reset</button>
        </div>
    </form>
</section>
